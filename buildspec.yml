# buildspec.yml
# Arm64 build for the VantaUM Next.js app.
# Intended to be used by the arm64 CodeBuild project defined in infra-aws/lib/build-stack.ts
#
# Local Docker (Colima) on the M-series Mac emulates amd64 and silently
# produces wrong-arch images that crash Fargate with `exec format error`.
# Native arm64 CodeBuild compute eliminates the cross-platform guessing.
#
# YAML note: every command that contains a literal `:` is double-quoted so
# CodeBuild's parser doesn't interpret it as a YAML mapping. The verification
# gate is a single shell expression with `&&` rather than a multi-line block
# scalar — block scalars confuse CodeBuild's command-array parser.

version: 0.2

phases:
  pre_build:
    commands:
      - "echo 'Logging into ECR...'"
      - "aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_URI"
      - "COMMIT_SHA=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7); IMAGE_TAG_RESOLVED=${IMAGE_TAG:-${COMMIT_SHA:-v5-arm64}}; echo \"Building for linux/arm64 with tag: $IMAGE_TAG_RESOLVED\"; export IMAGE_TAG=$IMAGE_TAG_RESOLVED"

  build:
    commands:
      - "echo 'Building Docker image for linux/arm64...'"
      - "docker build --platform linux/arm64 -t $ECR_REPOSITORY_URI:$IMAGE_TAG ."
      - "ARCH=$(docker image inspect $ECR_REPOSITORY_URI:$IMAGE_TAG --format '{{.Architecture}}') && echo \"Built image architecture: $ARCH\" && if [ \"$ARCH\" != \"arm64\" ]; then echo \"FATAL: image is $ARCH, expected arm64. Refusing to push.\"; exit 1; fi"

  post_build:
    commands:
      - "echo 'Pushing image...'"
      - "docker push $ECR_REPOSITORY_URI:$IMAGE_TAG"
      - "echo \"Successfully pushed arm64 image: $ECR_REPOSITORY_URI:$IMAGE_TAG\""
      - "echo \"IMAGE_URI=$ECR_REPOSITORY_URI:$IMAGE_TAG\" > image.env"
      - "echo 'Build completed successfully.'"

artifacts:
  files:
    - image.env
  name: arm64-image-metadata

cache:
  paths:
    - /root/.npm
    - /root/.cache
